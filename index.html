<!-- icon list-->
<!DOCTYPE html>
<html class="wide wow-animation" lang="en">

<head>
  <!-- Site Title-->
  <title>Home</title>
  <meta name="format-detection" content="telephone=no">
  <meta name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta charset="utf-8">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <!-- Stylesheets-->
  <link rel="stylesheet" type="text/css"
    href="//fonts.googleapis.com/css?family=Lato:400,700,400italic%7CPoppins:300,400,500,700">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/style.min.css">

<body>

  <section class="header">
    <div class="container">
      <img src="images/logo-white.svg" alt="logo" class="header__logo">
      <div class="header__wrapper">
        <div class="header__label">Nie masz konta?</div>
        <div class="header__link">Zostań klientem</div>
      </div>
    </div>
  </section>

  <section class="login">
    <div class="container">
      <div class="login__modal">
        <div class="login__wrapper">
          <div class="login__title">Logowanie do Pekao24</div>
          <div class="login__lang">
            <a href="#"><img src="icons/uk.svg" alt="uk" class="login__lang_icon"></a>
            <a href="#"><img src="icons/ua.svg" alt="ua" class="login__lang_icon"></a>
            <!-- icons/pl.svg -->
          </div>
        </div>
        <div class="login__descr">Wpisz numer klienta / nazwę użytkownika</div>
        <form class="login__form">
          <label for="username"></label>
          <input class="login__input" type="text" id="username" name="username" placeholder="" required>
        </form>
        <div class="login__button_wrapper">
          <button type="submit" class="login__button">Dalej</button>

        </div>

        <a href="#" class="login__client">Nie masz konta? Zostań klientem</a>
        <hr>
        <div class="login__announcement">
          <img src="" alt="watch" class="login__announcement_img"></img>
          <div class="login__announcement_descr">
            <strong>22.05.2023 r. w godz. 1.00-4.00 </strong>
            przeprowadzimy
            <strong>prace serwisowe.</strong>
            Sprawdź, co nie będzie działać.
            <a href="#">Więcej></a>
          </div>
        </div>
        <div class="login__red-links">
          <div class="login__security-link">

          </div>

          <div class="login__assistance-link">

          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Javascript-->
  <script src="js/main.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script></script>
</body>

</html>
